<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seasons Viewer</title>
    <link rel="stylesheet" href="./dist/output.css" />
  </head>
  <body class="bg-white text-gray-800 h-screen flex items-center justify-center">
    <div class="container flex flex-col items-center">
      <h1 class="text-4xl font-bold text-blue-500 mb-6 mb-12">Seasons Viewer</h1>
      <h2 class="bg-blue-300 text-3xl pl-24" >hello world</h2>
      <div class="flex items-start">
        <div id="center-column" class="text-center">
          <canvas id="seasonsCanvas" width="400" height="400" class="border-2 border-gray-800 rounded-lg shadow-md"></canvas>
          <button id="setToTodayButton" class="mt-4 px-6 py-2 bg-blue-500 text-white font-bold rounded-lg hover:bg-blue-600 transition">
            Set to Today
          </button>
          <div id="formattedDate" class="mt-4 text-lg font-medium"></div>
          <div id="sunlightPercentage" class="mt-2 text-lg font-medium"></div>
          <div id="daylightPercentage" class="mt-2 text-lg font-medium"></div>
        </div>
        <div class="right-column ml-10 w-52 h-96 p-4 bg-gray-100 border border-gray-300 rounded-lg shadow-md text-center">
          <p>placeholder text</p>
        </div>
      </div>
    </div>
  </body>
</html>
